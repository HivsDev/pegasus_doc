  - search:
      lang:
        - zh
        - en
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      cache_safe: true

markdown_extensions:
  - abbr
  - admonition
  - tables
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.magiclink

extra:
  favicon: assets/images/favicon.ico
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HivsDev/pegasus_doc
    - icon: fontawesome/solid/globe
      link: https://www.hisilicon.com
  generator: false
  consent:
    title: Cookie 同意
    actions:
      - accept
      - manage
  homepage: https://developers.hisilicon.com
  alternate:
    - name: 中文
      link: /
      lang: zh
    - name: English
      link: /en/
      lang: en

extra_css:
  - assets/stylesheets/extra.css
extra_javascript:
  - assets/javascripts/custom.js

