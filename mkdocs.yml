# 海思 Hi3403V100 芯片开发文档
# 基于 Material for MkDocs + 海思开发者社区风格

site_name: Hi3403V100 芯片开发文档
site_description: 海思 Hi3403V100/SS927V100 超高清智能网络录像机 SoC 完整开发文档社区
site_url: https://HivsDev.github.io/pegasus_doc/
repo_url: https://github.com/HivsDev/pegasus_doc
repo_name: Hi3403V100-docs

use_directory_urls: false

theme:
  name: material
  logo: assets/images/hisilicon_light.svg
  language: zh
  palette:
    - scheme: default
      primary: white
      accent: deep-purple
  font:
    text: Helvetica Neue, PingFang SC, Microsoft YaHei
    code: Consolas, Roboto Mono
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.path
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: fontawesome/solid/edit

plugins:
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      languages:
        - locale: zh
          name: 中文
          default: true
          build: true
          theme:
            language: zh
        - locale: en
          name: English
          build: true
          theme:
            language: en
          nav_translations:
            首页: Home
            系统架构: System Architecture
            产品简介: Product Overview
            SDK 安装与升级: SDK Installation & Upgrade
