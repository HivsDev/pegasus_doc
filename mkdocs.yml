# 海思 Hi3403V100 芯片开发文档
# 基于 Material for MkDocs + 海思开发者社区风格

site_name: Hi3403V100 芯片开发文档
site_description: 海思 Hi3403V100/SS927V100 超高清智能网络录像机 SoC 完整开发文档社区
site_url: https://docs.hisilicon.com/repos/fbb_ss928v100/zh-CN/master/
repo_url: https://gitlab.local/hisilicon/ss928v100-docs
repo_name: ss928v100-docs

use_directory_urls: false

theme:
  name: material
  locale: zh
  language: zh
  palette:
    - scheme: default
      primary: white
      accent: deep-purple
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: slate
      primary: white
      accent: deep-purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Helvetica Neue, PingFang SC, Microsoft YaHei
    code: Consolas, Roboto Mono
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.path
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: fontawesome/pen-to-square

plugins:
  - search:
      lang: zh
      separator: '[\s\-_,:!=.()"/]+|(?!\s)(?=zh)'
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      cache_safe: true

markdown_extensions:
  - abbr
  - admonition
  - tables
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.magiclink

extra:
  favicon: assets/images/favicon.ico
  social:
    - icon: fontawesome/brands/github
      link: https://gitlab.local/hisilicon/ss928v100-docs
    - icon: fontawesome/solid/globe
      link: https://www.hisilicon.com
  version:
    provider: mike
  generator: false
  consent:
    title: Cookie 同意
    actions:
      - accept
      - manage
  homepage: https://developers.hisilicon.com

extra_css:
  - assets/stylesheets/extra.css
extra_javascript:
  - assets/javascripts/custom.js

